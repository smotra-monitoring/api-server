name: Build and deploy
on:
  release:
    types: ['published']
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  id-token: write
  attestations: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  GO_VERSION: '1.26'
  IMAGE_NAME: ghcr.io/${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      # - name: Generate API code
      #   run: |
      #     go install github.com/oapi-codegen/oapi-codegen/v2/cmd/oapi-codegen@latest
      #     ~/go/bin/oapi-codegen --config api/oapi-codegen.yaml https://raw.githubusercontent.com/${{ github.repository_owner }}/openapi/refs/heads/master/api/spec.yaml

      - name: Run tests
        run: go test -race -v ./...

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./deployments/docker/prod/Dockerfile
          push: true
          attestations: type=sbom
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            ${{ env.IMAGE_NAME }}:${{ github.ref_name }}
            ${{ env.IMAGE_NAME }}:latest
          build-args: |
            BUILD_DATE=${{ github.event.repository.pushed_at }}
            BUILD_REVISION=${{ github.sha }}
            BUILD_VERSION=${{ github.ref_name }}
            BUILD_ATTESTATION=true
